name: Verify Task

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t recover-task -f environment/Dockerfile .

    - name: Run Solver and Verifier
      run: |
        docker run --rm -v ${{ github.workspace }}:/workspace -w /app recover-task bash -c "
          cp /workspace/environment/corrupted_ledger.csv /app/corrupted_ledger.csv &&
          cp -r /workspace/solution/* /app/ &&
          bash /app/solve.sh &&
          mkdir -p /tests &&
          cp /workspace/tests/* /tests/ &&
          bash /tests/test.sh
        "
